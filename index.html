<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Ledger Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://tailwindcss.com"></script>
    <!-- FontAwesome CDN for clean interface icons -->
    <link rel="stylesheet" href="https://cloudflare.com" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased">

    <!-- Top Sticky Navigation Bar -->
    <nav class="bg-indigo-600 text-white p-4 flex justify-between items-center shadow-md sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-chart-pie text-xl text-indigo-200"></i>
            <h1 class="text-lg font-bold tracking-wide">Shop Ledger System</h1>
        </div>
        <span id="sync-status" class="text-xs bg-indigo-700 px-3 py-1 rounded-md font-medium border border-indigo-500 transition-all duration-300">
            Connecting...
        </span>
    </nav>

    <!-- Main Content Container -->
    <main class="max-w-7xl mx-auto p-4 sm:p-6 space-y-6">

        <!-- Top Overview Metrics Grid -->
        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- Given Metric -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Given</p>
                <h3 id="metric-given" class="text-xl font-bold text-gray-900 mt-1">$0.00</h3>
            </div>
            <!-- Received Metric -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Received</p>
                <h3 id="metric-received" class="text-xl font-bold text-emerald-600 mt-1">$0.00</h3>
            </div>
            <!-- Pending Balance Metric -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Pending</p>
                <h3 id="metric-pending" class="text-xl font-bold text-amber-600 mt-1">$0.00</h3>
            </div>
            <!-- Unique Shops Count -->
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Shops</p>
                <h3 id="metric-shops" class="text-xl font-bold text-purple-900 mt-1">0</h3>
            </div>
        </section>

        <!-- Search Bar -->
        <section class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center">
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="search-input" placeholder="Search by shop name..." 
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
            </div>
        </section>

        <!-- Ledger Entries Section -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- Desktop Layout Table (visible on screens larger than mobile) -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-xs font-bold text-gray-500 uppercase tracking-wider">
                            <th class="p-4">Shop Name</th>
                            <th class="p-4">Date</th>
                            <th class="p-4 text-right">Amount Given</th>
                            <th class="p-4 text-right">Amount Received</th>
                            <th class="p-4 text-right">Pending Balance</th>
                            <th class="p-4 text-center">Status</th>
                            <th class="p-4">Notes</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-sm text-gray-700">
                        <tr>
                            <td colspan="7" class="p-8 text-center text-gray-400">
                                <i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading dashboard modules...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Mobile Layout Container (visible on phones) -->
            <div id="mobile-list" class="block md:hidden divide-y divide-gray-100">
                <div class="p-8 text-center text-gray-400 text-sm">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading dashboard modules...
                </div>
            </div>
        </section>
    </main>

    <script>
        // GOOGLE SHEET SYNC CONFIGURATION
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdlco1RbLt9TnSPpATWQ1ZdTz2p1Uk3zSM3MVgekyoMOSn2gcwQRAAYDEJQ9yWJqtorfLbxTWNEmyv/pub?output=csv';

        let ledgerRecords = [];

        async function fetchSheetData() {
            const statusEl = document.getElementById('sync-status');
            try {
                // cache-busting timestamp string appended to bypass aggressive mobile CDNs
                const cleanUrl = SHEET_CSV_URL + '&t=' + new Date().getTime();
                
                const response = await fetch(cleanUrl);
                if (!response.ok) throw new Error("Failed to read public data link streams.");
                
                const textData = await response.text();
                ledgerRecords = parseCSV(textData);
                
                renderDashboard(ledgerRecords);
                statusEl.innerText = "Connected";
                statusEl.className = "text-xs bg-emerald-500 text-white px-3 py-1 rounded-md font-medium shadow-sm";
            } catch (error) {
                console.error(error);
                statusEl.innerText = "Sync Failed";
                statusEl.className = "text-xs bg-rose-500 text-white px-3 py-1 rounded-md font-medium shadow-sm";
                
                const errorMarkup = `
                    <div class="p-8 text-center text-rose-500 text-xs font-semibold">
                        <i class="fa-solid fa-triangle-exclamation text-xl mb-1 block"></i>
                        Unable to connect to Google Sheets. Verify publication output mappings.
                    </div>`;
                document.getElementById('table-body').innerHTML = `<tr><td colspan="7">${errorMarkup}</td></tr>`;
                document.getElementById('mobile-list').innerHTML = errorMarkup;
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split(/\r?\n/);
            if (lines.length < 2) return [];
            const headers = lines.split(',').map(h => h.trim().replace(/"/g, ''));
            return lines.slice(1).map(line => {
                const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
                const cleanValues = matches.map(v => v.trim().replace(/^"|"$|^'|'$/g, ''));
                let item = {};
                headers.forEach((header, index) => { item[header] = cleanValues[index] || ""; });
                return item;
            }).filter(item => item["Shop Name"]);
        }

        function renderDashboard(data) {
            let givenTotal = 0, receivedTotal = 0;
            let totalUniqueShops = new Set();
            const tbody = document.getElementById('table-body');
            const mList = document.getElementById('mobile-list');
            
            tbody.innerHTML = "";
            mList.innerHTML = "";

            if(data.length === 0) {
                const emptyHTML = `<div class="p-6 text-center text-gray-400 text-sm">No ledger data matching search filter criteria.</div>`;
                tbody.innerHTML = `<tr><td colspan="7">${emptyHTML}</td></tr>`;
                mList.innerHTML = emptyHTML;
                return;
            }

            data.forEach(row => {
                const given = parseFloat(row["Amount Given"]) || 0;
                const received = parseFloat(row["Amount Received"]) || 0;
                const pending = given - received;

                givenTotal += given;
                receivedTotal += received;
                if(row["Shop Name"]) totalUniqueShops.add(row["Shop Name"]);

                // Dynamic CSS Badge Renderer Engine
                let statusStyle = "bg-gray-100 text-gray-700";
                const rowStatus = (row["Status"] || "").trim().toLowerCase();
                if (rowStatus === 'paid' || rowStatus === 'completed') statusStyle = "bg-emerald-100 text-emerald-800";
                else if (rowStatus === 'pending' || rowStatus === 'partial') statusStyle = "bg-amber-100 text-amber-800";
                else if (rowStatus === 'overdue') statusStyle = "bg-rose-100 text-rose-800";

                // 1. Build Desktop Table UI Matrix Row 
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/60 border-b border-gray-100 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-gray-900">${row["Shop Name"]}</td>
                    <td class="p-4 text-gray-500 text-xs">${row["Date"] || '-'}</td>
                    <td class="p-4 text-right font-mono text-xs">${formatCurrency(given)}</td>
                    <td class="p-4 text-right font-mono text-emerald-600 text-xs">${formatCurrency(received)}</td>
                    <td class="p-4 text-right font-mono font-bold text-xs ${pending > 0 ? 'text-amber-600' : 'text-gray-900'}">${formatCurrency(pending)}</td>
                    <td class="p-4 text-center"><span class="px-2.5 py-0.5 text-xs font-semibold rounded-full ${statusStyle}">${row["Status"] || 'Unknown'}</span></td>
                    <td class="p-4 text-gray-400 text-xs max-w-xs truncate" title="${row["Notes"] || ''}">${row["Notes"] || '-'}</td>
                `;
                tbody.appendChild(tr);

                // 2. Build Mobile Screen Stack Cards UI Row
                const card = document.createElement('div');
                card.className = "p-4 space-y-3 bg-white";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-gray-900 text-base">${row["Shop Name"]}</h4>
                            <span class="text-[11px] text-gray-400"><i class="fa-regular fa-calendar mr-1"></i>${row["Date"] || 'No Date Specified'}</span>
                        </div>
                        <span class="px-2 py-0.5 text-[10px] font-bold rounded-full ${statusStyle}">${row["Status"] || 'Unknown'}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-1 text-center font-mono border-t border-gray-50">
                        <div class="text-left"><span class="text-[9px] uppercase tracking-tight text-gray-400 block font-sans">Given</span><span class="text-xs text-gray-700 font-semibold">${formatCurrency(given)}</span></div>
                        <div><span class="text-[9px] uppercase tracking-tight text-gray-400 block font-sans">Received</span><span class="text-xs text-emerald-600 font-semibold">${formatCurrency(received)}</span></div>
                        <div class="text-right"><span class="text-[9px] uppercase tracking-tight text-gray-400 block font-sans">Pending</span><span class="text-xs font-bold ${pending > 0 ? 'text-amber-600' : 'text-gray-900'}">${formatCurrency(pending)}</span></div>
                    </div>
                    ${row["Notes"] ? `<p class="text-xs bg-gray-50 text-gray-500 p-2 rounded-lg border border-gray-100 text-left"><span class="text-[9px] uppercase font-semibold text-gray-400 block font-sans tracking-wide">Notes</span>${row["Notes"]}</p>` : ''}
                `;
                mList.appendChild(card);
            });

            document.getElementById('metric-given').innerText = formatCurrency(givenTotal);
            document.getElementById('metric-received').innerText = formatCurrency(receivedTotal);
            document.getElementById('metric-pending').innerText = formatCurrency(givenTotal - receivedTotal);
            document.getElementById('metric-shops').innerText = totalUniqueShops.size;
        }

        function formatCurrency(val) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
        }

        // Search action listener
        document.getElementById('search-input').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = ledgerRecords.filter(row => (row["Shop Name"] || '').toLowerCase().includes(val));
            renderDashboard(filtered);
        });

        window.addEventListener('DOMContentLoaded', fetchSheetData);
    </script>
</body>
</html>
